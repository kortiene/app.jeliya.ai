name: ci

# Every required technical-preview gate runs on pull requests, pushes to main,
# and release tags (through workflow_call). No gate is allowed to turn green by
# silently skipping a missing daemon or FFI library.

on:
  push:
    branches:
      - main
  pull_request:
  # Maintainers can run the same complete matrix twice on one immutable SHA
  # without entering the write-capable release workflow.
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs-ui:
    name: docs + TypeScript + release contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.22.3'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Verify documentation profile and navigation
        run: |
          set -euo pipefail
          node --test scripts/check-docs.test.mjs
          node scripts/check-docs.mjs

      - name: Verify secret-storage boundaries
        run: |
          set -euo pipefail
          node --test scripts/check-secret-storage.test.mjs
          node scripts/check-secret-storage.mjs

      - name: Verify release and installer contracts
        run: |
          set -euo pipefail
          node --test scripts/check-release.test.mjs scripts/check-installers.test.mjs \
            scripts/release-receipt.test.mjs scripts/finalize-release.test.mjs
          node scripts/check-release.mjs --source
          shellcheck scripts/finalize-release.sh
          shellcheck packaging/install.sh

      - name: Install TypeScript dependencies
        working-directory: ui
        run: npm ci

      # Verify the shared design-token fixture BEFORE anything renders against
      # it: assets/design-tokens.json is the one source both clients answer to,
      # and this half also enforces the shadow, side-stripe and gradient rules
      # DESIGN.md states as absolutes (issue #75).
      - name: Verify design-system conformance
        run: node scripts/check-design-tokens.mjs

      # Catalog completeness, French typography, and the never-translate
      # boundary for the web client (issue #74).
      - name: Verify web localization catalogs
        run: |
          set -euo pipefail
          node --test scripts/check-ui-i18n.test.mjs
          node scripts/check-ui-i18n.mjs

      # The whole vitest suite EXCEPT the live-daemon oracle. Only the
      # mock-conformance file used to run here, so twelve other test files —
      # routing, the room list, attention, QR, landmarks, motion — had never
      # once run in CI and could not have failed a pull request (issue #76).
      #
      # The daemon oracle is excluded deliberately, not skipped: it hard-fails
      # when `target/debug/jeliyad` is absent, and that is the point — a
      # silently-skipped conformance suite reads as green while covering
      # nothing. This job never builds Rust, so the corpus runs in the job that
      # does, via `npm run test:conformance`.
      - name: TypeScript unit and mock conformance suite
        working-directory: ui
        run: npm run test:unit

      - name: TypeScript build
        working-directory: ui
        run: npm run build

  ui-e2e:
    name: UI browser regression (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.22.3'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install TypeScript dependencies
        working-directory: ui
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ui
        run: npx playwright install --with-deps chromium

      # The responsive UX regression suite (ui/e2e) drives the real app against
      # the VITE_MOCK=1 fixture client across desktop and compact viewports —
      # no daemon required, so this gate cannot silently skip one.
      - name: Browser regression suite
        working-directory: ui
        run: npm run test:e2e

      # A failure has to carry the exact combination it failed under —
      # viewport, locale and text scale — or reproducing it means guessing.
      # e2e/fixtures.ts attaches those to every failing test, and the
      # accessibility specs attach the axe violation list alongside them.
      - name: Preserve failure evidence (screenshots, traces, console logs)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-failure-evidence
          path: |
            ui/playwright-report
            ui/test-results
          retention-days: 14

  rust-runtime:
    name: Rust + smoke + E2E + protocol conformance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust 1.96.0
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.2

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.22.3'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Rust format
        run: cargo fmt --all --check

      - name: Rust clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --locked --workspace

      - name: Build required live-test binaries
        run: |
          set -euo pipefail
          cargo build --locked -p jeliyad
          test -x target/debug/jeliyad
          command -v lsof >/dev/null

      # Step order matters: the deterministic checks below run BEFORE the
      # network evidence harness at the end of this job. A step that fails
      # skips every later step, so putting the slowest and least deterministic
      # check first meant one flake hid every result after it. Keep new
      # deterministic steps above the harness.
      - name: TypeScript conformance against the real daemon
        working-directory: ui
        env:
          JELIYA_REQUIRE_DAEMON: '1'
        run: |
          set -euo pipefail
          test -x ../target/debug/jeliyad
          npm ci
          npm run test:conformance

      - name: Daemon smoke test
        run: node scripts/smoke.mjs target/debug/jeliyad

      - name: Sidecar contract
        run: node scripts/sidecar-check.mjs target/debug/jeliyad

      - name: Two-peer loopback E2E
        run: node scripts/e2e.mjs --mode loopback

      - name: Agent and fleet port-ownership safety
        run: node --test scripts/e2e-port-safety.test.mjs

      - name: Agent authorization E2E
        run: node scripts/agent-e2e.mjs

      - name: Fleet orchestration E2E
        run: node scripts/fleet-e2e.mjs --trials 5

      # Last on purpose: this is the slowest step in the job and the only one
      # that has flaked on unrelated changes (it waits up to 120s for a third
      # loopback peer to settle a direct path). It consumes nothing the steps
      # above produce and uses a port none of them touch, so running it last
      # costs nothing and stops a flake here from skipping real results.
      - name: Network evidence harness safety and loopback qualification
        run: |
          set -euo pipefail
          test -x target/debug/jeliyad
          node --test scripts/realnet-evidence.test.mjs
          node scripts/realnet-evidence.mjs --local-dryrun --with-third

  msrv:
    name: MSRV 1.91.0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust 1.91.0
        uses: dtolnay/rust-toolchain@ad7910d95e317a4b12a9a3dfad520f4b409b3ec0 # 1.91.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.2
        with:
          key: msrv-1.91.0

      - name: Verify exact compiler and workspace
        run: |
          set -euo pipefail
          rustc --version | grep '^rustc 1\.91\.0 '
          cargo check --locked --workspace --all-targets

  windows-installer:
    name: Windows installer integrity
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Parse and exercise checksum enforcement
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = (Resolve-Path 'packaging/install.ps1').Path
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            $installer,
            [ref]$tokens,
            [ref]$parseErrors
          ) | Out-Null
          if ($parseErrors.Count -ne 0) { throw ($parseErrors | Out-String) }

          $root = Join-Path $env:RUNNER_TEMP "jeliya-installer-$PID"
          $fixtures = Join-Path $root 'fixtures'
          $payload = Join-Path $root 'payload'
          New-Item -ItemType Directory -Force -Path $fixtures, $payload | Out-Null
          $asset = 'jeliyad-v9.8.7-x86_64-pc-windows-msvc.zip'
          $payloadExe = Join-Path $payload 'jeliyad.exe'
          Set-Content -LiteralPath $payloadExe -Value 'verified daemon fixture' -NoNewline
          $global:JeliyaFixtureArchive = Join-Path $fixtures $asset
          Compress-Archive -LiteralPath $payloadExe -DestinationPath $global:JeliyaFixtureArchive
          $digest = (Get-FileHash -LiteralPath $global:JeliyaFixtureArchive -Algorithm SHA256).Hash.ToLowerInvariant()
          $global:JeliyaFixtureChecksum = Join-Path $fixtures "$asset.sha256"
          Set-Content -LiteralPath $global:JeliyaFixtureChecksum -Value "$digest  $asset" -Encoding ascii

          function global:Invoke-WebRequest {
            param(
              [string]$Uri,
              [string]$OutFile,
              [switch]$UseBasicParsing
            )
            $source = if ($Uri.EndsWith('.sha256')) {
              $global:JeliyaFixtureChecksum
            } else {
              $global:JeliyaFixtureArchive
            }
            Copy-Item -LiteralPath $source -Destination $OutFile
          }

          $env:JELIYA_VERSION = 'v9.8.7'
          $env:LOCALAPPDATA = Join-Path $root 'local-app-data'
          & $installer
          $installed = Join-Path $env:LOCALAPPDATA 'Programs\Jeliya\jeliyad.exe'
          if (-not (Test-Path $installed -PathType Leaf)) { throw 'verified installer did not install jeliyad.exe' }
          if ((Get-Content -LiteralPath $installed -Raw) -ne 'verified daemon fixture') {
            throw 'installed bytes differ from the verified fixture'
          }

          Remove-Item -LiteralPath $installed -Force
          Set-Content -LiteralPath $global:JeliyaFixtureArchive -Value 'tampered archive' -NoNewline
          $rejected = $false
          try {
            & $installer
          } catch {
            if ($_.Exception.Message -notmatch 'checksum mismatch') { throw }
            $rejected = $true
          }
          if (-not $rejected) { throw 'tampered archive was not rejected' }
          if (Test-Path $installed) { throw 'tampered archive produced an installed executable' }

          Remove-Item -LiteralPath $global:JeliyaFixtureArchive -Force
          Compress-Archive -LiteralPath $payloadExe -DestinationPath $global:JeliyaFixtureArchive
          $digest = (Get-FileHash -LiteralPath $global:JeliyaFixtureArchive -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath $global:JeliyaFixtureChecksum -Value "$digest  $asset" -Encoding ascii
          $global:JeliyaSimulateReparse = $true
          function global:Expand-Archive {
            param(
              [string]$LiteralPath,
              [string]$DestinationPath,
              [switch]$Force
            )
            New-Item -ItemType Directory -Force -Path $DestinationPath | Out-Null
            Set-Content -LiteralPath (Join-Path $DestinationPath 'jeliyad.exe') `
              -Value 'simulated reparse payload' -NoNewline
          }
          function global:Get-ChildItem {
            param(
              [string]$LiteralPath,
              [switch]$Recurse,
              [switch]$File
            )
            if ($global:JeliyaSimulateReparse) {
              return [pscustomobject]@{
                Name = 'jeliyad.exe'
                Attributes = [System.IO.FileAttributes]::ReparsePoint
              }
            }
            Microsoft.PowerShell.Management\Get-ChildItem @PSBoundParameters
          }
          $reparseRejected = $false
          try {
            & $installer
          } catch {
            if ($_.Exception.Message -notmatch 'reparse point') { throw }
            $reparseRejected = $true
          }
          if (-not $reparseRejected) { throw 'reparse-point payload was not rejected' }
          if (Test-Path $installed) { throw 'reparse-point payload produced an installed executable' }

  dependency-security:
    name: dependency security (Cargo + npm)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust 1.96.0
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-audit@0.22.1

      - name: Cargo advisory audit
        run: cargo audit

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.22.3'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: npm high/critical advisory audit
        working-directory: ui
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm audit --audit-level=high
